services:
  home-automation:
    build: .
    container_name: home-automation
    restart: unless-stopped
    # ---- HomeKit mDNS discovery ----
    # hap-nodejs advertises the bridge via mDNS (Bonjour) multicast. Docker bridge
    # networks isolate multicast traffic, so Apple devices on the host network
    # cannot discover the bridge.  Three options:
    #
    # 1. network_mode: host — simplest; change MQTT_HOST to localhost (or host IP).
    # 2. macvlan network — create a macvlan Docker network and use the engine's
    #    HomekitServiceOptions `bind` to the macvlan interface name.
    # 3. avahi-reflector on the Docker host — forwards mDNS between networks.
    #
    # With the default bridge network the bridge will only be reachable from other
    # containers on the same network.
    #
    # Kubernetes: see docs/deployment.md (hostNetwork or Multus CNI + macvlan).
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - ZIGBEE2MQTT_PREFIX=zigbee2mqtt
      - LOG_LEVEL=info
      - NODE_ENV=production
      - TZ=Europe/Berlin
      - HTTP_PORT=8080
    volumes:
      - homekit-persist:/data/homekit-persist
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:8080/readyz'); process.exit(r.ok ? 0 : 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      mosquitto:
        condition: service_started
    networks:
      - home-automation

  # Only include this if you don't already have Mosquitto running elsewhere.
  # If your Mosquitto broker is on another host, remove this service and
  # update MQTT_HOST above to point to your broker's IP/hostname.
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - home-automation

networks:
  home-automation:
    driver: bridge

volumes:
  homekit-persist:
  mosquitto-data:
  mosquitto-log:
