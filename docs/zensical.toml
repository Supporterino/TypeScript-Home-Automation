[project]
site_name = "TypeScript Home Automation"
variant = "modern"
site_url = "https://supporterino.github.io/TypeScript-Home-Automation/"
site_description = "A lightweight, fully typed home automation framework built on MQTT for Bun."
site_author = "Supporterino"
docs_dir = "."
copyright = "Copyright &copy; 2026 Supporterino"
repo_url = "https://github.com/Supporterino/TypeScript-Home-Automation"
repo_name = "Supporterino/TypeScript-Home-Automation"
edit_uri = "edit/main/docs/"
nav = [
  {"Home" = "index.md"},
  { "Getting Started" = "getting-started.md" },
  { "Configuration" = "configuration.md" },
  { "Writing Automations" = "writing-automations.md" },
  { "Device Base Classes" = "device-classes.md" },
  { "Services" = [
    { "HomeKit" = "services/homekit.md" },
    { "Shelly" = "services/shelly.md" },
    { "Nanoleaf" = "services/nanoleaf.md" },
    { "Weather" = "services/weather.md" },
    { "Notifications" = "services/notifications.md" },
    { "Device Registry" = "device-registry.md" }
  ]},
  { "State Management" = "state.md" },
  { "Device Types" = "device-types.md" },
  { "HTTP" = [
    { "Health Probes" = "http/health-probes.md" },
    { "Web UI" = "http/web-ui.md" }
  ]},
  { "CLI Reference" = "cli.md" },
  { "Architecture" = "architecture.md" },
  { "Contributing" = "contributing.md" }
]

[project.theme]
language = "en"
features = [
  "navigation.tracking",
  "navigation.path",
  "search.highlight",
  "content.action.edit", # Edit this page
  "content.action.view"  # View source of this page
#  "navigation.tabs"
]

[project.theme.icon]
logo = "material/gitlab"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://https://github.com/Supporterino"
